name: androblight
description: "AndroBlight - Android Malware Detector"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # HTTP Client
  dio: ^5.4.0
  
  # State Management
  provider: ^6.1.1
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Utilities
  path_provider: ^2.1.2
  intl: ^0.20.2
  file_picker: ^10.3.10
  share_plus: ^12.0.1
  url_launcher: ^6.3.0
  
  # QR Code display for 2FA setup (Chunk 6)
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: '^0.14.4'

flutter:
  generate: true
  uses-material-design: true
  
  assets:
    - assets/
    - assets/launcher/

# Launcher icons — source files in assets/launcher/ (same artwork as app_logo, square + padded).
# launcher_icon_1024.png: master for flutter_launcher_icons (recommended 1024×1024).
# launcher_icon_512.png: same design at 512×512 (for reference or manual tools).
# app_logo_original.png: copy of assets/app_logo.png before square padding.
flutter_launcher_icons:
  android: 'launcher_icon'
  ios: true
  image_path: 'assets/launcher/launcher_icon_1024.png'
  image_path_android: 'assets/launcher/launcher_icon_1024.png'
  image_path_ios: 'assets/launcher/launcher_icon_1024.png'
  min_sdk_android: 21
  adaptive_icon_background: '#8B5CF6'
  adaptive_icon_foreground: 'assets/launcher/launcher_icon_1024.png'
  web:
    generate: true
    image_path: 'assets/launcher/launcher_icon_1024.png'
    background_color: '#8B5CF6'
    theme_color: '#7C3AED'
  windows:
    generate: true
    image_path: 'assets/launcher/launcher_icon_1024.png'
    icon_size: 256
  macos:
    generate: true
    image_path: 'assets/launcher/launcher_icon_1024.png'
